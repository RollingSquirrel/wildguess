name: E2E Tests (Local Setup)

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  e2e:
    name: Playwright E2E Tests (Local Setup)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1

      - name: Setup pnpm
        uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v4.1.0
        with:
          version: 10
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
        with:
          node-version: 24

      # --- API ---
      - name: Install API dependencies
        run: pnpm install --frozen-lockfile
        working-directory: wildguess-api

      - name: Start API server
        run: pnpm dev &
        working-directory: wildguess-api
        env:
          PORT: 3000
          POLLING_RATE_MS: 1000
          ROOM_TIMEOUT_MS: 30000
          DB_PATH: /tmp/wildguess-e2e.db
          LOG_LEVEL: error
          LOG_FORMAT: json
          LOG_FILE_ENABLED: "false"
          CORS_ORIGIN: "*"
          ENABLE_TEST_ROUTES: "true"

      # --- Frontend ---
      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile
        working-directory: wildguess

      - name: Start Angular dev server
        run: pnpm start &
        working-directory: wildguess

      # --- E2E ---
      - name: Install E2E dependencies
        run: pnpm install --frozen-lockfile
        working-directory: e2e

      - name: Install Playwright browsers
        run: pnpm exec playwright install chromium --with-deps
        working-directory: e2e

      - name: Run Playwright E2E tests
        run: pnpm run test:local
        working-directory: e2e
        env:
          CI: true

      - name: Check for flaky tests
        if: always()
        run: |
          if [ -f e2e/test-results/.last-run.json ]; then
            STATUS=$(jq -r '.status' e2e/test-results/.last-run.json)
            if [ "$STATUS" = "failed" ]; then
              echo "::error::Playwright had failing tests (including flaky runs that passed on retry)"
              exit 1
            fi
          fi

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: playwright-report
          path: |
            e2e/playwright-report/
            e2e/test-results/
          retention-days: 7
